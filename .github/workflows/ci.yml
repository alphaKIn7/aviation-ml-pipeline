# ──────────────────────────────────────────────
# CI/CD Pipeline — GitHub Actions
# ──────────────────────────────────────────────
#
# PURPOSE:
#   Automatically run tests and checks every time code is pushed.
#   This catches bugs BEFORE they reach production.
#
# WHAT IT DOES:
#   1. Lint code (flake8/ruff)      → Catch style issues
#   2. Run unit tests (pytest)      → Catch logic bugs
#   3. Check types (mypy)           → Catch type errors
#   4. Run integration tests        → Catch module interface issues
#
# WHY CI/CD FOR ML?
#   ML code is HARDER to test than regular software because:
#   - Data changes
#   - Models are non-deterministic
#   - Training takes time
#   CI/CD ensures at minimum your code doesn't crash.

name: ML Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Type check
        run: mypy src/ --ignore-missing-imports
